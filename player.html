<body style="background:#0F0F0F; color:white; padding-bottom:100px;">
    <div id="player-box" style="width:100%; aspect-ratio:16/9; background:#000;"></div>

    <div style="padding:15px;">
        <h3 id="v-title" style="font-size:18px; margin:0;">Video Title</h3>
        <p style="color:#aaa; font-size:12px; margin:10px 0;">1.5M views • 2 hours ago</p>

        <div style="display:flex; align-items:center; justify-content:space-between; margin-top:15px;">
            <div style="display:flex; align-items:center; gap:10px;">
                <img id="c-img" src="" style="width:40px; height:40px; border-radius:50%;">
                <div>
                    <p id="c-name" style="font-weight:bold; font-size:15px; margin:0;">Channel</p>
                    <p style="color:#aaa; font-size:11px; margin:0;">2.4M subscribers</p>
                </div>
            </div>
            <button style="background:white; color:black; border:none; padding:8px 16px; border-radius:20px; font-weight:bold;">Subscribe</button>
        </div>
    </div>

    <div style="padding:15px; border-top:1px solid #333;">
        <h4 style="margin-bottom:15px;">Up next</h4>
        <div id="up-next-list">
            </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const vid = params.get('v');
        const title = decodeURIComponent(params.get('t') || "Real Video");
        const chan = decodeURIComponent(params.get('c') || "YouTube Channel");

        // 1. Play main video
        if(vid) {
            document.getElementById('player-box').innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${vid}?autoplay=1" frameborder="0" allowfullscreen></iframe>`;
            document.getElementById('v-title').innerText = title;
            document.getElementById('c-name').innerText = chan;
            document.getElementById('c-img').src = `https://i.pravatar.cc/100?u=${chan}`;
        }

        // 2. Fetch "Up Next" list from another channel to show variety
        async function loadNextList() {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=UCq-Fj5jknLsUf-MWSy4_brA`);
            const data = await res.json();
            let listHtml = "";
            data.items.forEach(item => {
                const id = item.link.split('v=')[1];
                listHtml += `
                <div onclick="window.location.href='player.html?v=${id}&t=${encodeURIComponent(item.title)}&c=${encodeURIComponent(item.author)}'" style="display:flex; gap:10px; margin-bottom:15px;">
                    <div style="position:relative; min-width:160px;">
                        <img src="https://img.youtube.com/vi/${id}/mqdefault.jpg" style="width:100%; border-radius:8px;">
                        <span style="position:absolute; bottom:5px; right:5px; background:rgba(0,0,0,0.8); color:white; font-size:10px; padding:2px 4px; border-radius:4px;">10:45</span>
                    </div>
                    <div>
                        <p style="font-size:14px; margin:0; line-height:1.2; font-weight:500;">${item.title.substring(0,40)}...</p>
                        <p style="font-size:12px; color:#aaa; margin-top:5px;">${item.author}</p>
                    </div>
                </div>`;
            });
            document.getElementById('up-next-list').innerHTML = listHtml;
        }
        loadNextList();
    </script>
</body>
