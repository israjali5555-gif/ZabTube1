<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <title>Clean YouTube Player</title>
    <style>
        body { background:#000; color:white; margin:0; font-family: sans-serif; overflow: hidden; }
        
        /* LOGO HATANE KA TRICK: Container ko overflow hide karke iframe ko zoom kiya gaya hai */
        .video-screen { 
            position: relative; 
            width: 100%; 
            aspect-ratio: 16/9; 
            background: #000; 
            overflow: hidden; /* Ye logo ko bahar phenk dega */
        }

        iframe { 
            position: absolute;
            top: -10%; /* Logo upar nikal gaya */
            left: -1%;
            width: 102%; 
            height: 120%; /* Height badha di taaki niche wala logo bhi chhip jaye */
            border: none; 
            pointer-events: none; /* User asli youtube controls ko touch nahi kar payega */
        }

        /* AAPKA KHUD KA CONTROL LAYER */
        .my-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 100; display: flex; flex-direction: column; justify-content: space-between;
            background: rgba(0,0,0,0.1); 
        }

        .center-play { flex: 1; display: flex; align-items: center; justify-content: center; }
        .play-icon { 
            font-size: 60px; color: white; background: rgba(0,0,0,0.4); 
            border-radius: 50%; padding: 10px; cursor: pointer; 
            display: none; /* Click par dikhega */
        }

        /* Niche ki Laal Line (Seekbar) */
        .progress-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.2); cursor: pointer; }
        .progress-red { width: 0%; height: 100%; background: #ff0000; position: relative; }
        .progress-red::after { content: ''; position: absolute; right: 0; top: -4px; width: 12px; height: 12px; background: #ff0000; border-radius: 50%; }

        .info-section { background: #0F0F0F; padding: 15px; height: 100vh; overflow-y: auto; }
        .yt-btn { background: #272727; border: none; color: white; padding: 8px 15px; border-radius: 20px; font-size: 13px; display: flex; align-items: center; white-space: nowrap; }
    </style>
</head>
<body>

    <div class="video-screen" id="click-area" onclick="toggleVideo()">
        <div id="api-player"></div>
        
        <div class="my-overlay">
            <div style="display:flex; justify-content:flex-end; padding:10px; gap:15px;">
                <span class="material-icons-outlined">hd</span>
                <span class="material-icons-outlined">fullscreen</span>
            </div>

            <div class="center-play">
                <span class="material-icons-outlined play-icon" id="big-icon">play_arrow</span>
            </div>

            <div class="progress-bar" onclick="manualSeek(event)">
                <div class="progress-red" id="red-line"></div>
            </div>
        </div>
    </div>

    <div class="info-section">
        <h2 id="v-title" style="font-size:18px; margin:0;">Loading...</h2>
        <div style="display:flex; gap:10px; margin:15px 0;">
            <button class="yt-btn"><span class="material-icons-outlined">thumb_up</span> &nbsp; 12K</button>
            <button class="yt-btn"><span class="material-icons-outlined">share</span> &nbsp; Share</button>
            <button class="yt-btn"><span class="material-icons-outlined">download</span> &nbsp; Download</button>
        </div>
        
        <div style="display:flex; align-items:center; gap:12px; border-top:1px solid #333; padding-top:15px;">
            <img id="c-img" src="" style="width:35px; height:35px; border-radius:50%;">
            <p id="c-name" style="flex:1; font-weight:bold; margin:0;">Channel</p>
            <button style="background:white; color:black; border:none; padding:6px 15px; border-radius:20px; font-weight:bold;">Subscribe</button>
        </div>

        <div id="up-next" style="margin-top:20px;"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const videoId = params.get('v');
        let player, isPlaying = false;

        // YouTube Iframe API Load
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('api-player', {
                videoId: videoId,
                playerVars: { 
                    'autoplay': 1, 
                    'controls': 0, 
                    'modestbranding': 1, 
                    'rel': 0, 
                    'iv_load_policy': 3, 
                    'disablekb': 1 
                },
                events: { 'onReady': onPlayerReady }
            });
        }

        function onPlayerReady(event) {
            event.target.mute(); // Autoplay ke liye mute zaroori hai
            event.target.playVideo();
            isPlaying = true;
            setInterval(syncProgress, 1000);
            loadNextList();
        }

        function toggleVideo() {
            const icon = document.getElementById('big-icon');
            if (isPlaying) {
                player.pauseVideo();
                icon.innerText = "play_arrow";
                icon.style.display = "block";
                isPlaying = false;
            } else {
                player.unMute(); // Click karte hi awaaz chalu
                player.playVideo();
                icon.innerText = "pause";
                icon.style.display = "block";
                setTimeout(() => { icon.style.display = "none"; }, 800);
                isPlaying = true;
            }
        }

        function syncProgress() {
            if (player && player.getCurrentTime) {
                const pct = (player.getCurrentTime() / player.getDuration()) * 100;
                document.getElementById('red-line').style.width = pct + "%";
            }
        }

        function manualSeek(e) {
            const rect = e.target.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            player.seekTo(player.getDuration() * pct);
        }

        async function loadNextList() {
            document.getElementById('v-title').innerText = decodeURIComponent(params.get('t'));
            document.getElementById('c-name').innerText = decodeURIComponent(params.get('c'));
            document.getElementById('c-img').src = `https://i.pravatar.cc/100?u=${params.get('c')}`;

            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=UCq-Fj5jknLsUf-MWSy4_brA`);
            const data = await res.json();
            let html = "";
            data.items.forEach(v => {
                const id = v.link.split('v=')[1];
                html += `<div onclick="location.href='player.html?v=${id}&t=${encodeURIComponent(v.title)}&c=${encodeURIComponent(v.author)}'" style="display:flex; gap:10px; margin-bottom:15px;">
                    <img src="https://img.youtube.com/vi/${id}/mqdefault.jpg" style="width:120px; border-radius:8px;">
                    <p style="font-size:13px; margin:0;">${v.title.substring(0,40)}...</p>
                </div>`;
            });
            document.getElementById('up-next').innerHTML = "<h4>Up next</h4>" + html;
        }
    </script>
</body>
</html>
