<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Playing...</title>
</head>
<body style="background:#0F0F0F; color:white; padding-bottom:70px;">
    <div id="player-box" style="width:100%; aspect-ratio:16/9; background:#000; position:sticky; top:0; z-index:100;"></div>

    <div style="padding:12px;">
        <h3 id="v-title" style="font-size:17px; margin:0; line-height:1.4;">Real Video Title</h3>
        <p style="color:#aaa; font-size:12px; margin:8px 0;">1.5M views • 2 hours ago</p>

        <div style="display:flex; gap:10px; overflow-x:auto; padding:10px 0;">
            <button class="action-btn" onclick="this.style.color='#3ea6ff'"><span class="material-icons-outlined">thumb_up</span> 12K</button>
            <button class="action-btn"><span class="material-icons-outlined">share</span> Share</button>
            <button class="action-btn"><span class="material-icons-outlined">download</span> Download</button>
        </div>

        <div style="display:flex; align-items:center; justify-content:space-between; border-top:1px solid #333; padding:15px 0; margin-top:10px;">
            <div style="display:flex; align-items:center; gap:10px;">
                <img id="c-img" src="" style="width:40px; height:40px; border-radius:50%; background:#333;">
                <div>
                    <p id="c-name" style="font-weight:bold; font-size:15px; margin:0;">Channel Name</p>
                    <p style="color:#aaa; font-size:11px; margin:0;">2.4M subscribers</p>
                </div>
            </div>
            <button style="background:white; color:black; border:none; padding:8px 16px; border-radius:20px; font-weight:bold;">Subscribe</button>
        </div>
    </div>

    <div style="padding:12px; border-top:4px solid #222;">
        <h4 style="margin-bottom:15px; font-size:16px;">Up next</h4>
        <div id="next-list"></div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><span class="material-icons-outlined">home</span><br>Home</a>
        <a href="shorts.html" class="nav-item"><span class="material-icons-outlined">explore</span><br>Shorts</a>
        <a href="upload.html" class="nav-item icon-btn"><span class="material-icons-outlined" style="font-size:38px;">add_circle_outline</span></a>
        <a href="subscriptions.html" class="nav-item"><span class="material-icons-outlined">subscriptions</span><br>Subs</a>
        <a href="profile.html" class="nav-item"><span class="material-icons-outlined">account_circle</span><br>You</a>
    </nav>

    <script>
        const params = new URLSearchParams(window.location.search);
        const vId = params.get('v');
        const vTitle = params.get('t');
        const vChan = params.get('c');

        if(vId){
            document.getElementById('player-box').innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${vId}?autoplay=1" frameborder="0" allowfullscreen></iframe>`;
            document.getElementById('v-title').innerText = decodeURIComponent(vTitle);
            document.getElementById('c-name').innerText = decodeURIComponent(vChan);
            document.getElementById('c-img').src = `https://i.pravatar.cc/100?u=${vChan}`;
        }

        // Automatic List Generation
        const dummy = [{id:'K4DyBUG242c',t:'Trending Now',c:'YT Pro'},{id:'qYv_Y4uL8Yk',t:'Latest Music 2026',c:'Music Lab'}];
        let h = "";
        dummy.forEach(s => {
            h += `<div onclick="location.href='player.html?v=${s.id}&t=${s.t}&c=${s.c}'" style="display:flex; gap:12px; margin-bottom:15px;">
                <img src="https://img.youtube.com/vi/${s.id}/mqdefault.jpg" style="width:150px; border-radius:8px;">
                <div><p style="font-size:14px; margin:0; font-weight:500;">${s.t}</p><p style="font-size:12px; color:#aaa; margin:5px 0;">${s.c}</p></div>
            </div>`;
        });
        document.getElementById('next-list').innerHTML = h;
    </script>
</body>
</html>
