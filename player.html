<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Playing Video...</title>
</head>
<body style="background:#0f0f0f; padding-bottom: 0;">

    <div class="main-video-container" style="position: sticky; top: 0; z-index: 100; background: #000;">
        <video id="mainPlayer" controls autoplay style="width: 100%; aspect-ratio: 16/9;">
            <source src="video1.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <div class="video-details" style="padding: 12px;">
        <h2 style="font-size: 18px; line-height: 1.4;">Ruffian Gaming: Best Win Ever! | Highlights 2026</h2>
        <p style="color: #aaa; font-size: 13px; margin-top: 5px;">1.5M views • 2 hours ago ...more</p>
        
        <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 15px;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <div style="width: 35px; height: 35px; background: #3ea6ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold;">R</div>
                <div>
                    <p style="font-weight: bold; font-size: 14px;">Ruffian Gaming</p>
                    <p style="color: #aaa; font-size: 11px;">2.4M subscribers</p>
                </div>
            </div>
            <button style="background: white; color: black; border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 13px;">Subscribe</button>
        </div>

        <div style="display: flex; gap: 10px; overflow-x: auto; margin-top: 15px; padding-bottom: 5px;">
            <button class="action-btn"><span class="material-icons-outlined">thumb_up</span> 12K</button>
            <button class="action-btn"><span class="material-icons-outlined">thumb_down</span></button>
            <button class="action-btn"><span class="material-icons-outlined">share</span> Share</button>
            <button class="action-btn"><span class="material-icons-outlined">download</span> Download</button>
        </div>
    </div>

    <hr style="border: 0; border-top: 1px solid #333; margin: 10px 0;">

    <div class="suggested-section" style="padding: 10px;">
        <h3 style="font-size: 16px; margin-bottom: 15px;">Up next</h3>
        
        <div class="suggested-card" onclick="location.reload()" style="display: flex; gap: 10px; margin-bottom: 15px;">
            <div style="width: 160px; height: 90px; background: #222; border-radius: 8px; flex-shrink: 0;"></div>
            <div>
                <p style="font-size: 13px; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">PUBG Mobile: New Map Leak!</p>
                <p style="color: #aaa; font-size: 11px; margin-top: 4px;">Gaming Zone • 45K views</p>
            </div>
        </div>

        <div class="suggested-card" onclick="location.reload()" style="display: flex; gap: 10px; margin-bottom: 15px;">
            <div style="width: 160px; height: 90px; background: #222; border-radius: 8px; flex-shrink: 0;"></div>
            <div>
                <p style="font-size: 13px; font-weight: 500;">Top 10 Gaming Phones 2026</p>
                <p style="color: #aaa; font-size: 11px; margin-top: 4px;">Tech Review • 200K views</p>
            </div>
        </div>
    </div>

</body>
</html>
