<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <title>Pro Player</title>
    <style>
        body { background:#000; color:white; margin:0; font-family: sans-serif; overflow-x: hidden; }
        .vid-frame { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; }
        
        /* YouTube Logo Hide Hack */
        iframe { position: absolute; top: -12%; left: -1%; width: 102%; height: 124%; border: none; pointer-events: none; }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; }
        .center-play { flex: 1; display: flex; align-items: center; justify-content: center; }
        .main-icon { font-size: 50px; background: rgba(0,0,0,0.6); border-radius: 50%; padding: 10px; opacity: 0; }
        
        /* Seekbar */
        .seekbar { width: 100%; height: 4px; background: rgba(255,255,255,0.3); position: relative; cursor: pointer; }
        .seekbar-fill { height: 100%; background: #f00; width: 0%; pointer-events: none; }
        
        /* Top bar icons */
        .top-btns { display: flex; justify-content: flex-end; padding: 10px; gap: 15px; background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent); }
        .top-btns span { font-size: 22px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="vid-frame">
        <div id="yt-player"></div>
        <div class="overlay" id="full-overlay">
            <div class="top-btns" onclick="event.stopPropagation()">
                <span class="material-icons-outlined">hd</span>
                <span class="material-icons-outlined" onclick="location.reload()">refresh</span>
                <span class="material-icons-outlined">fullscreen</span>
            </div>

            <div class="center-play" id="tap-zone">
                <span class="material-icons-outlined main-icon" id="play-ui">play_arrow</span>
            </div>

            <div class="seekbar" onclick="seek(event); event.stopPropagation();">
                <div class="seekbar-fill" id="fill"></div>
            </div>
        </div>
    </div>

    <div style="padding:15px; background:#0F0F0F;">
        <h3 id="v-t" style="margin:0; font-size:16px;">Loading...</h3>
        <p id="c-n" style="color:#aaa; font-size:13px; margin:5px 0;"></p>
        <div id="list" style="margin-top:20px;"></div>
    </div>

    <script>
        const p = new URLSearchParams(window.location.search);
        let player, playing = false;

        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                videoId: p.get('v'),
                playerVars: { 'autoplay': 1, 'controls': 0, 'modestbranding': 1, 'rel': 0, 'iv_load_policy': 3 },
                events: { 'onReady': (e) => {
                    e.target.playVideo();
                    // THE HACK: Hum har 100ms mein awaaz kholne ki koshish karenge
                    let autoUnmute = setInterval(() => {
                        if(player.getPlayerState() === 1) {
                            player.unMute(); 
                            if(!player.isMuted()) clearInterval(autoUnmute);
                        }
                    }, 100);
                    playing = true;
                    setInterval(update, 1000);
                }}
            });
        }

        // Tap Zone Logic
        document.getElementById('tap-zone').onclick = function(e) {
            const icon = document.getElementById('play-ui');
            if (playing) {
                player.pauseVideo();
                icon.innerText = "play_arrow";
                icon.style.opacity = "1";
                playing = false;
            } else {
                player.unMute();
                player.playVideo();
                icon.innerText = "pause";
                icon.style.opacity = "1";
                setTimeout(() => { icon.style.opacity = "0"; }, 700);
                playing = true;
            }
        };

        function update() {
            if(player && player.getCurrentTime) {
                document.getElementById('fill').style.width = (player.getCurrentTime()/player.getDuration()*100) + "%";
            }
        }

        function seek(e) {
            const pct = (e.clientX / window.innerWidth);
            player.seekTo(player.getDuration() * pct);
        }

        // Load Data
        document.getElementById('v-t').innerText = decodeURIComponent(p.get('t'));
        document.getElementById('c-n').innerText = decodeURIComponent(p.get('c'));
    </script>
</body>
</html>
