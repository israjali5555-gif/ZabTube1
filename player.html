<body style="background:#0F0F0F; color:white;">
    <div id="main-player" style="width:100%; aspect-ratio:16/9;"></div>

    <div style="padding:12px;">
        <h3 id="display-title" style="margin:0; font-size:17px;">Loading Title...</h3>
        <p style="color:#aaa; font-size:12px; margin:8px 0;">1.5M views • 2 hours ago</p>

        <div style="display:flex; gap:10px; overflow-x:auto; padding:10px 0;">
            <button class="action-btn" onclick="alert('Liked!')"><span class="material-icons-outlined">thumb_up</span> 12K</button>
            <button class="action-btn"><span class="material-icons-outlined">share</span> Share</button>
            <button class="action-btn"><span class="material-icons-outlined">download</span> Download</button>
        </div>

        <div style="display:flex; align-items:center; justify-content:space-between; border-top:1px solid #333; padding:15px 0;">
            <div style="display:flex; align-items:center; gap:10px;">
                <img id="display-chan-img" src="" style="width:40px; height:40px; border-radius:50%; background:#444;">
                <div>
                    <p id="display-channel" style="font-weight:bold; margin:0; font-size:15px;">Channel Name</p>
                    <p style="color:#aaa; font-size:12px; margin:0;">2.4M subscribers</p>
                </div>
            </div>
            <button style="background:white; color:black; border:none; padding:8px 15px; border-radius:20px; font-weight:bold;">Subscribe</button>
        </div>
    </div>

    <div style="padding:12px; border-top:5px solid #222;">
        <h4 style="margin-bottom:15px;">Up next</h4>
        <div id="suggested-list">
            </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const videoId = params.get('v');
        const title = params.get('t');
        const channel = params.get('c');

        // 1. Play Video
        document.getElementById('main-player').innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${videoId}?autoplay=1" frameborder="0" allowfullscreen></iframe>`;
        
        // 2. Update Details
        document.getElementById('display-title').innerText = title || "Real Video Title";
        document.getElementById('display-channel').innerText = channel || "Real Channel";
        document.getElementById('display-chan-img').src = `https://i.pravatar.cc/100?u=${channel}`;

        // 3. Load Up Next List (Dummy real-looking list)
        const suggestions = [
            {id: '7PCXmS50o70', t: 'Recommended Video 1', c: 'Music Pro'},
            {id: 'K4DyBUG242c', t: 'New Trending Clip', c: 'Daily Vlogs'},
            {id: 'qYv_Y4uL8Yk', t: 'Superhit Movie Scene', c: 'Movie Hub'}
        ];

        let listHtml = "";
        suggestions.forEach(s => {
            listHtml += `
            <div onclick="location.href='player.html?v=${s.id}&t=${s.t}&c=${s.c}'" style="display:flex; gap:10px; margin-bottom:15px;">
                <img src="https://img.youtube.com/vi/${s.id}/mqdefault.jpg" style="width:140px; border-radius:8px;">
                <div>
                    <p style="font-size:14px; margin:0; font-weight:500;">${s.t}</p>
                    <p style="font-size:12px; color:#aaa; margin:5px 0;">${s.c}</p>
                </div>
            </div>`;
        });
        document.getElementById('suggested-list').innerHTML = listHtml;
    </script>
</body>
