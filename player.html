<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>YouTube Player</title>
</head>
<body style="background:#0F0F0F; color:white; margin:0; padding-bottom:80px;">

    <div style="position:sticky; top:0; z-index:100; width:100%; aspect-ratio:16/9; background:#000;">
        <div id="main-player" style="width:100%; height:100%;"></div>
    </div>

    <div style="padding:12px;">
        <h2 id="vid-title" style="font-size:18px; font-weight:500; margin:0; line-height:1.4;">Video Title</h2>
        <p style="color:#aaa; font-size:13px; margin:10px 0;">1.5M views • 2 hours ago... <span style="color:white;">more</span></p>

        <div style="display:flex; gap:10px; overflow-x:auto; padding:5px 0;">
            <div style="display:flex; background:#272727; border-radius:20px;">
                <button style="background:none; border:none; color:white; padding:8px 15px; border-right:1px solid #444; display:flex; align-items:center;"><span class="material-icons-outlined" style="margin-right:5px;">thumb_up</span> 12K</button>
                <button style="background:none; border:none; color:white; padding:8px 15px;"><span class="material-icons-outlined">thumb_down</span></button>
            </div>
            <button style="background:#272727; border:none; color:white; padding:8px 18px; border-radius:20px; display:flex; align-items:center;"><span class="material-icons-outlined" style="margin-right:8px;">share</span> Share</button>
            <button style="background:#272727; border:none; color:white; padding:8px 18px; border-radius:20px; display:flex; align-items:center;"><span class="material-icons-outlined" style="margin-right:8px;">download</span> Download</button>
        </div>

        <div style="display:flex; align-items:center; justify-content:space-between; margin-top:20px; padding-top:15px; border-top:1px solid #272727;">
            <div style="display:flex; align-items:center; gap:12px;">
                <img id="chan-img" src="" style="width:40px; height:40px; border-radius:50%;">
                <div>
                    <p id="chan-name" style="margin:0; font-weight:bold; font-size:15px;">Channel</p>
                    <p style="margin:0; color:#aaa; font-size:11px;">2.5M subscribers</p>
                </div>
            </div>
            <button style="background:white; color:black; border:none; padding:8px 16px; border-radius:20px; font-weight:bold;">Subscribe</button>
        </div>
    </div>

    <div style="padding:12px; border-top:4px solid #272727;">
        <h4 style="margin-bottom:15px;">Up next</h4>
        <div id="next-list"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const vid = params.get('v');
        const title = decodeURIComponent(params.get('t') || "Real Video");
        const chan = decodeURIComponent(params.get('c') || "Channel Name");

        if(vid) {
            document.getElementById('main-player').innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${vid}?autoplay=1" frameborder="0" allowfullscreen></iframe>`;
            document.getElementById('vid-title').innerText = title;
            document.getElementById('chan-name').innerText = chan;
            document.getElementById('chan-img').src = `https://i.pravatar.cc/100?u=${chan}`;
        }

        async function loadSuggestions() {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=UCq-Fj5jknLsUf-MWSy4_brA`);
            const data = await res.json();
            data.items.forEach(item => {
                const id = item.link.split('v=')[1];
                document.getElementById('next-list').innerHTML += `
                <div onclick="location.href='player.html?v=${id}&t=${encodeURIComponent(item.title)}&c=${encodeURIComponent(item.author)}'" style="display:flex; gap:12px; margin-bottom:15px;">
                    <div style="position:relative; min-width:160px; height:90px;">
                        <img src="https://img.youtube.com/vi/${id}/mqdefault.jpg" style="width:100%; height:100%; border-radius:8px; object-fit:cover;">
                        <span style="position:absolute; bottom:5px; right:5px; background:rgba(0,0,0,0.8); font-size:10px; padding:2px 4px; border-radius:4px;">14:02</span>
                    </div>
                    <div>
                        <p style="font-size:14px; margin:0; font-weight:500; color:white; line-height:1.2;">${item.title.substring(0,45)}...</p>
                        <p style="font-size:12px; color:#aaa; margin-top:5px;">${item.author}</p>
                    </div>
                </div>`;
            });
        }
        loadSuggestions();
    </script>
</body>
</html>
