<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <title>Modern YouTube Player</title>
    <style>
        body { background:#0F0F0F; color:white; margin:0; font-family: "Roboto", sans-serif; overflow-x: hidden; }
        
        /* 1. Video Container */
        .video-container { position: relative; width: 96%; margin: 8px auto; aspect-ratio: 16/9; border-radius: 12px; overflow: hidden; background: #000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        iframe { width: 100%; height: 100%; border: none; pointer-events: none; }

        /* 2. YouTube Style Center Controls (FIXED) */
        .ui-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 10; display: flex; align-items: center; justify-content: space-evenly;
            background: rgba(0,0,0,0.4); opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .ui-overlay.active { opacity: 1; pointer-events: auto; }
        
        .ctrl-btn { 
            font-size: 35px; color: white; background: rgba(0,0,0,0.5); 
            border-radius: 50%; padding: 12px; cursor: pointer; user-select: none;
        }
        .play-pause-btn { font-size: 50px; }

        /* 3. Red Seekbar */
        .seekbar-box { position: absolute; bottom: 0; width: 100%; height: 3px; background: rgba(255,255,255,0.2); z-index: 20; }
        .seekbar-red { height: 100%; background: #FF0000; width: 0%; transition: width 0.1s linear; }

        /* 4. Description Area */
        .info-card { padding: 12px 16px; }
        .video-title { font-size: 19px; font-weight: bold; line-height: 1.3; margin-bottom: 8px; }
        .meta-text { font-size: 13px; color: #aaa; margin-bottom: 12px; }

        /* 5. Buttons Row */
        .action-row { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 16px; padding-bottom: 4px; scrollbar-width: none; }
        .action-row::-webkit-scrollbar { display: none; }
        .chip { background: #272727; border: none; color: white; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; display: flex; align-items: center; white-space: nowrap; }
        .chip i { font-size: 18px; margin-right: 6px; }

        /* 6. Channel Section */
        .channel-section { display: flex; align-items: center; gap: 12px; padding: 12px; background: #1E1E1E; border-radius: 12px; margin-bottom: 20px; }
        .channel-section img { width: 40px; height: 40px; border-radius: 50%; }
        .sub-btn { background: #F1F1F1; color: #0F0F0F; border: none; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 13px; }

        /* 7. Suggestions List */
        .up-next-title { font-size: 16px; font-weight: bold; margin: 10px 0; }
        .suggestion-card { display: flex; gap: 12px; margin-bottom: 12px; text-decoration: none; color: white; }
        .suggestion-card img { width: 150px; aspect-ratio: 16/9; border-radius: 8px; object-fit: cover; }
    </style>
</head>
<body onclick="showControls()">

    <div class="video-container">
        <div id="player"></div>
        <div class="ui-overlay" id="ctrl-layer">
            <span class="material-icons ctrl-btn" onclick="skipSec(-10)">skip_previous</span>
            <span class="material-icons ctrl-btn play-pause-btn" id="ui-btn" onclick="togglePlay()">pause</span>
            <span class="material-icons ctrl-btn" onclick="skipSec(10)">skip_next</span>
        </div>
        <div class="seekbar-box" onclick="manualSeek(event); event.stopPropagation();">
            <div class="seekbar-red" id="progress-bar"></div>
        </div>
    </div>

    <div class="info-card">
        <div class="video-title" id="v-title">Loading...</div>
        <div class="meta-text">1.2M views • 3 days ago ...more</div>

        <div class="action-row">
            <button class="chip"><i class="material-icons">thumb_up</i> 45K</button>
            <button class="chip"><i class="material-icons">share</i> Share</button>
            <button class="chip"><i class="material-icons">file_download</i> Download</button>
            <button class="chip"><i class="material-icons">content_cut</i> Remix</button>
        </div>

        <div class="channel-section">
            <img id="c-img" src="">
            <div style="flex:1;">
                <div style="font-weight:bold; font-size:15px;" id="c-name">Channel Name</div>
                <div style="font-size:12px; color:#aaa;">2.5M subscribers</div>
            </div>
            <button class="sub-btn">Subscribe</button>
        </div>

        <div class="up-next-title">Up next</div>
        <div id="suggestions"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let player, isPlaying = false, controlTimer;

        // YouTube API Load
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: urlParams.get('v'),
                playerVars: { 'autoplay': 1, 'controls': 0, 'modestbranding': 1, 'rel': 0 },
                events: { 'onReady': onPlayerReady }
            });
        }

        function onPlayerReady(event) {
            event.target.playVideo();
            let unmuteInt = setInterval(() => {
                player.unMute();
                if(!player.isMuted()) clearInterval(unmuteInt);
            }, 300);
            isPlaying = true;
            setInterval(updateSeek, 1000);
            loadPageData();
            showControls(); // Start with controls shown
        }

        // Show/Hide Controls Logic
        function showControls() {
            const layer = document.getElementById('ctrl-layer');
            layer.classList.add('active');
            clearTimeout(controlTimer);
            controlTimer = setTimeout(() => {
                layer.classList.remove('active');
            }, 3000);
        }

        function togglePlay() {
            const btn = document.getElementById('ui-btn');
            if (isPlaying) {
                player.pauseVideo();
                btn.innerText = "play_arrow";
            } else {
                player.playVideo();
                btn.innerText = "pause";
            }
            isPlaying = !isPlaying;
            event.stopPropagation();
        }

        function skipSec(sec) {
            player.seekTo(player.getCurrentTime() + sec);
            event.stopPropagation();
        }

        function updateSeek() {
            if(player && player.getCurrentTime) {
                let p = (player.getCurrentTime() / player.getDuration()) * 100;
                document.getElementById('progress-bar').style.width = p + "%";
            }
        }

        function manualSeek(e) {
            let rect = e.target.getBoundingClientRect();
            let pos = (e.clientX - rect.left) / rect.width;
            player.seekTo(pos * player.getDuration());
        }

        async function loadPageData() {
            document.getElementById('v-title').innerText = decodeURIComponent(urlParams.get('t'));
            document.getElementById('c-name').innerText = decodeURIComponent(urlParams.get('c'));
            document.getElementById('c-img').src = `https://ui-avatars.com/api/?name=${urlParams.get('c')}&background=random`;

            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=UCq-Fj5jknLsUf-MWSy4_brA`);
            const data = await res.json();
            let html = "";
            data.items.forEach(v => {
                const id = v.link.split('v=')[1];
                html += `
                <a class="suggestion-card" href="player.html?v=${id}&t=${encodeURIComponent(v.title)}&c=${encodeURIComponent(v.author)}">
                    <img src="https://img.youtube.com/vi/${id}/mqdefault.jpg">
                    <div>
                        <div style="font-size:14px; font-weight:500; line-height:1.2;">${v.title.substring(0,50)}...</div>
                        <div style="font-size:12px; color:#aaa; margin-top:5px;">${v.author}</div>
                    </div>
                </a>`;
            });
            document.getElementById('suggestions').innerHTML = html;
        }
    </script>
</body>
</html>
