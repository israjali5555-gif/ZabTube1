<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <title>ZabPlay - Premium Player</title>
    <style>
        body { background:#0F0F0F; color:white; margin:0; font-family: "Roboto", sans-serif; overflow-x: hidden; }
        
        /* 1. STICKY VIDEO PLAYER (LOCK ON TOP) */
        .video-wrapper { 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            background: #000; 
            width: 100%; 
            aspect-ratio: 16/9; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.8);
        }
        #player { width: 100%; height: 100%; }

        /* 2. DESCRIPTION AREA */
        .info-card { padding: 15px; background: #0F0F0F; }
        .video-title { font-size: 18px; font-weight: bold; line-height: 1.4; margin-bottom: 8px; color: #fff; }
        .meta-text { font-size: 12px; color: #aaa; margin-bottom: 15px; }

        /* 3. ACTION BUTTONS */
        .action-row { display: flex; gap: 10px; overflow-x: auto; margin-bottom: 20px; scrollbar-width: none; }
        .action-row::-webkit-scrollbar { display: none; }
        .chip { background: #272727; border: none; color: white; padding: 8px 16px; border-radius: 20px; font-size: 13px; display: flex; align-items: center; white-space: nowrap; }
        .chip i { font-size: 18px; margin-right: 6px; }

        /* 4. REAL CHANNEL SECTION */
        .channel-section { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-top: 1px solid #222; border-bottom: 1px solid #222; margin-bottom: 20px; cursor: pointer; }
        .channel-section img { width: 40px; height: 40px; border-radius: 50%; background: #333; }
        .sub-btn { background: #fff; color: #000; border: none; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 13px; margin-left: auto; }

        /* 5. RELATED VIDEOS LIST */
        .up-next-title { font-size: 16px; font-weight: bold; padding: 0 15px 10px 15px; }
        .suggestion-card { display: flex; gap: 12px; padding: 10px 15px; text-decoration: none; color: white; transition: background 0.2s; }
        .suggestion-card:active { background: #222; }
        .suggestion-card img { width: 140px; aspect-ratio: 16/9; border-radius: 8px; object-fit: cover; background: #222; }
        .s-text { flex: 1; }
        .s-title { font-size: 14px; font-weight: 500; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .s-meta { font-size: 12px; color: #aaa; margin-top: 4px; }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <div id="player"></div>
    </div>

    <div class="info-card">
        <div class="video-title" id="v-title">Loading video details...</div>
        <div class="meta-text" id="v-meta">-- views • -- ago</div>

        <div class="action-row">
            <button class="chip"><i class="material-icons">thumb_up_off_alt</i> <span id="v-likes">--</span></button>
            <button class="chip"><i class="material-icons">share</i> Share</button>
            <button class="chip"><i class="material-icons">download</i> Download</button>
            <button class="chip"><i class="material-icons">playlist_add</i> Save</button>
        </div>

        <div class="channel-section" id="channel-link">
            <img id="c-img" src="">
            <div>
                <div style="font-weight:bold; font-size:15px;" id="c-name">Loading...</div>
                <div style="font-size:12px; color:#aaa;" id="c-subs">-- subscribers</div>
            </div>
            <button class="sub-btn">Subscribe</button>
        </div>
    </div>

    <div class="up-next-title">Related Videos</div>
    <div id="suggestions"></div>

    <script>
        const API_KEY = 'AIzaSyDq0kXgyqtOFXPjytI5yw5tuIZYl-xuTFs'; 
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('v');

        if (!videoId) window.location.href = 'index.html';

        // 1. YouTube Player API Setup
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: videoId,
                playerVars: { 'autoplay': 1, 'rel': 0, 'modestbranding': 1 },
                events: { 'onReady': onPlayerReady }
            });
        }

        function onPlayerReady(event) {
            fetchVideoDetails();
        }

        // 2. Fetch Real Video & Channel Data
        async function fetchVideoDetails() {
            try {
                // Get Video Title, Views, Likes
                const vRes = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id=${videoId}&key=${API_KEY}`);
                const vData = await vRes.json();
                const video = vData.items[0];

                document.getElementById('v-title').innerText = video.snippet.title;
                document.getElementById('v-meta').innerText = parseInt(video.statistics.viewCount).toLocaleString() + " views";
                document.getElementById('v-likes').innerText = parseInt(video.statistics.likeCount).toLocaleString();

                const channelId = video.snippet.channelId;

                // Get Channel Photo & Subs
                const cRes = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=${channelId}&key=${API_KEY}`);
                const cData = await cRes.json();
                const channel = cData.items[0];

                document.getElementById('c-name').innerText = channel.snippet.title;
                document.getElementById('c-img').src = channel.snippet.thumbnails.default.url;
                document.getElementById('c-subs').innerText = formatSubs(channel.statistics.subscriberCount) + " subscribers";

                // Channel Profile Page Link
                document.getElementById('channel-link').onclick = () => {
                    window.location.href = `channel.html?cid=${channelId}`;
                };

                // Load Related Videos based on Category
                loadRelated(video.snippet.title.split(' ')[0]); // Title ke pehle word se search

            } catch (e) { console.error("API Error", e); }
        }

        // 3. Category Based Suggestions
        async function loadRelated(query) {
            const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=15&q=${encodeURIComponent(query)}&type=video&key=${API_KEY}`);
            const data = await res.json();
            let html = "";
            data.items.forEach(item => {
                if(item.id.videoId === videoId) return; // Same video skip karo
                html += `
                <a class="suggestion-card" href="player.html?v=${item.id.videoId}">
                    <img src="${item.snippet.thumbnails.medium.url}">
                    <div class="s-text">
                        <div class="s-title">${item.snippet.title}</div>
                        <div class="s-meta">${item.snippet.channelTitle}</div>
                    </div>
                </a>`;
            });
            document.getElementById('suggestions').innerHTML = html;
        }

        function formatSubs(count) {
            if (count >= 1000000) return (count/1000000).toFixed(1) + 'M';
            if (count >= 1000) return (count/1000).toFixed(1) + 'K';
            return count;
        }
    </script>
</body>
</html>
