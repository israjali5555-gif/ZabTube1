<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Custom Player</title>
    <style>
        .player-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; }
        iframe { width: 100%; height: 110%; border: none; position: absolute; top: -5%; pointer-events: none; }
        .custom-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center; 
            background: rgba(0,0,0,0.1); z-index: 10; cursor: pointer;
        }
        .my-play-btn { font-size: 65px; color: white; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }
        .action-btn { background: #272727; border: none; color: white; padding: 8px 18px; border-radius: 20px; display: flex; align-items: center; font-size: 13px; }
    </style>
</head>
<body style="background:#0F0F0F; color:white; margin:0; padding-bottom:80px;">

    <div class="player-wrapper" onclick="handleVideo()">
        <div id="yt-container"></div>
        <div class="custom-overlay" id="ui-overlay">
            <span class="material-icons-outlined my-play-btn" id="ctrl-icon">play_arrow</span>
        </div>
    </div>

    <div style="padding:15px;">
        <h2 id="v-title" style="font-size:18px; font-weight:500; margin:0;">Loading...</h2>
        
        <div style="display:flex; gap:10px; margin:15px 0; overflow-x:auto;">
            <button class="action-btn"><span class="material-icons-outlined" style="margin-right:5px;">thumb_up</span> 12K</button>
            <button class="action-btn"><span class="material-icons-outlined" style="margin-right:5px;">share</span> Share</button>
            <button class="action-btn"><span class="material-icons-outlined" style="margin-right:5px;">download</span> Download</button>
        </div>

        <div style="display:flex; align-items:center; gap:12px; border-top:1px solid #272727; padding-top:15px;">
            <img id="c-img" src="" style="width:40px; height:40px; border-radius:50%;">
            <p id="c-name" style="font-weight:bold; flex:1; font-size:15px;">Channel</p>
            <button style="background:white; color:black; border:none; padding:8px 16px; border-radius:20px; font-weight:bold;">Subscribe</button>
        </div>
    </div>

    <div id="next-list" style="padding:12px; border-top:4px solid #272727;"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const vid = params.get('v');
        let playing = false;

        if(vid) {
            // Modestbranding aur controls=0 se YouTube UI gayab
            document.getElementById('yt-container').innerHTML = `
                <iframe id="video-frame" src="https://www.youtube.com/embed/${vid}?enablejsapi=1&controls=0&modestbranding=1&rel=0&iv_load_policy=3" allow="autoplay"></iframe>`;
            document.getElementById('v-title').innerText = decodeURIComponent(params.get('t'));
            document.getElementById('c-name').innerText = decodeURIComponent(params.get('c'));
            document.getElementById('c-img').src = `https://i.pravatar.cc/100?u=${params.get('c')}`;
        }

        function handleVideo() {
            const frame = document.getElementById('video-frame').contentWindow;
            const icon = document.getElementById('ctrl-icon');
            const overlay = document.getElementById('ui-overlay');

            if(!playing) {
                frame.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
                icon.innerText = "pause";
                overlay.style.background = "transparent";
                setTimeout(() => { overlay.style.opacity = "0"; }, 800);
                playing = true;
            } else {
                frame.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
                icon.innerText = "play_arrow";
                overlay.style.opacity = "1";
                overlay.style.background = "rgba(0,0,0,0.2)";
                playing = false;
            }
        }
    </script>
</body>
</html>
