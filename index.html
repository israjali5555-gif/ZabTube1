<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>YouTube Home</title>
</head>
<body style="background:#0F0F0F; margin:0;">
    <header class="header">
        <div class="logo"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" width="90"></div>
        <div class="header-icons">
            <span class="material-icons-outlined">cast</span>
            <span class="material-icons-outlined">notifications</span>
            <span class="material-icons-outlined">search</span>
            <div class="user-profile-circle">R</div>
        </div>
    </header>

    <div class="categories">
        <button class="active">All</button>
        <button>Gaming</button>
        <button>Music</button>
        <button>Live</button>
    </div>

    <main class="feed" id="video-feed" style="padding-bottom: 70px;"></main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active"><span class="material-icons-outlined">home</span><br>Home</a>
        <a href="shorts.html" class="nav-item"><span class="material-icons-outlined">explore</span><br>Shorts</a>
        <a href="#" class="nav-item icon-btn"><span class="material-icons-outlined" style="font-size:35px;">add_circle_outline</span></a>
        <a href="subscriptions.html" class="nav-item"><span class="material-icons-outlined">subscriptions</span><br>Subs</a>
        <a href="profile.html" class="nav-item"><span class="material-icons-outlined">account_circle</span><br>You</a>
    </nav>

    <script>
        const feed = document.getElementById('video-feed');
        const channels = ['UCq-Fj5jknLsUf-MWSy4_brA', 'UC_aEa8K-EOJ3D6gOs7HcyNg', 'UCeVMnSShP_I8uyEQbbQjwGg'];

        async function fetchVideos() {
            for (let id of channels) {
                try {
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=${id}`);
                    const data = await res.json();
                    data.items.forEach(v => {
                        const vId = v.link.split('v=')[1];
                        // Real-looking time generation
                        const duration = `${Math.floor(Math.random()*10)+2}:${Math.floor(Math.random()*50)+10}`;
                        
                        feed.innerHTML += `
                        <div class="video-card" style="width:100%; margin-bottom:10px;">
                            <a href="player.html?v=${vId}&t=${encodeURIComponent(v.title)}&c=${encodeURIComponent(v.author)}" style="text-decoration:none; color:white;">
                                <div style="position:relative;">
                                    <img src="https://img.youtube.com/vi/${vId}/maxresdefault.jpg" style="width:100%; display:block;">
                                    <span style="position:absolute; bottom:8px; right:8px; background:rgba(0,0,0,0.8); padding:2px 5px; border-radius:4px; font-size:12px; font-weight:bold;">${duration}</span>
                                </div>
                                <div style="display:flex; padding:12px; gap:12px;">
                                    <img src="https://i.pravatar.cc/100?u=${v.author}" style="width:36px; height:36px; border-radius:50%;">
                                    <div style="flex:1;">
                                        <h3 style="font-size:14px; margin:0; line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">${v.title}</h3>
                                        <p style="font-size:12px; color:#aaa; margin:4px 0;">${v.author} • 1.2M views • 2 hours ago</p>
                                    </div>
                                </div>
                            </a>
                        </div>`;
                    });
                } catch (e) { console.log(e); }
            }
        }
        window.onload = fetchVideos;
    </script>
</body>
</html>
