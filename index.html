<script>
    const feed = document.getElementById('video-feed');
    const channels = ['UCq-Fj5jknLsUf-MWSy4_brA', 'UC_aEa8K-EOJ3D6gOs7HcyNg', 'UCeVMnSShP_I8uyEQbbQjwGg'];

    async function fetchVideos() {
        try {
            let allContent = "";
            for (let id of channels) {
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=${id}`);
                const data = await res.json();
                if (data.items) {
                    data.items.forEach(v => {
                        const vId = v.link.split('v=')[1];
                        // Special characters ko clean karne ke liye encodeURIComponent use kiya
                        allContent += `
                        <div class="video-card" style="margin-bottom:20px;">
                            <a href="player.html?v=${vId}&t=${encodeURIComponent(v.title)}&c=${encodeURIComponent(v.author)}">
                                <div class="thumbnail-container" style="position:relative;">
                                    <img src="https://img.youtube.com/vi/${vId}/maxresdefault.jpg" style="width:100%;">
                                    <span style="position:absolute; bottom:8px; right:8px; background:rgba(0,0,0,0.8); color:white; padding:2px 5px; font-size:12px; border-radius:4px; font-weight:bold;">12:45</span>
                                </div>
                            </a>
                            <div class="video-info" style="display:flex; padding:12px; gap:12px;">
                                <img src="https://i.pravatar.cc/100?u=${v.author}" style="width:36px; height:36px; border-radius:50%;">
                                <div class="text">
                                    <h3 style="font-size:14px; color:white; margin:0;">${v.title}</h3>
                                    <p style="font-size:12px; color:#aaa;">${v.author} • 1.2M views</p>
                                </div>
                            </div>
                        </div>`;
                    });
                }
            }
            feed.innerHTML = allContent;
        } catch (err) { console.error(err); }
    }
    window.onload = fetchVideos;
</script>
