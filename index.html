<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <title>YouTube Home - Pro</title>
    
    <script>
        // STEP 1: Security Check (Agar login nahi hai toh login page par bhej do)
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>

    <style>
        body { background:#0F0F0F; margin:0; font-family: Roboto, Arial, sans-serif; color: white; }
        
        /* Header Fix */
        .header { position: sticky; top: 0; background: #0F0F0F; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; }
        
        /* Video Card Style */
        .video-card { width: 100%; margin-bottom: 12px; border-bottom: 1px solid #222; }
        .thumbnail-container { position: relative; width: 100%; aspect-ratio: 16/9; }
        .thumbnail-container img { width: 100%; height: 100%; display: block; object-fit: cover; }
        .duration-badge { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.8); color: white; padding: 2px 6px; font-size: 11px; border-radius: 4px; }
        
        .video-info { display: flex; padding: 12px; gap: 12px; }
        .channel-icon { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: #333; }
        .video-text h3 { font-size: 14px; color: white; margin: 0; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .video-text p { font-size: 12px; color: #aaa; margin: 4px 0 0 0; }
        
        a { text-decoration: none; color: inherit; }

        /* Bottom Nav Fix */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #0F0F0F; display: flex; justify-content: space-around; padding: 8px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { color: white; text-align: center; font-size: 10px; text-decoration: none; display: flex; flex-direction: column; align-items: center; }
        .nav-item i { font-size: 24px; margin-bottom: 2px; }
        .upload-btn-main { font-size: 42px !important; margin-top: -10px; color: #fff; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" width="90">
        </div>
        <div class="header-icons" style="display: flex; gap: 18px;">
            <i class="material-icons">cast</i>
            <i class="material-icons">notifications_none</i>
            <i class="material-icons">search</i>
            <div style="width: 26px; height: 26px; border-radius: 50%; background: #FF5722; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold;" onclick="logout()">R</div>
        </div>
    </header>

    <div style="display: flex; gap: 10px; padding: 10px 15px; overflow-x: auto; white-space: nowrap; scrollbar-width: none;">
        <div style="background: white; color: black; padding: 6px 12px; border-radius: 8px; font-size: 14px;">All</div>
        <div style="background: #272727; color: white; padding: 6px 12px; border-radius: 8px; font-size: 14px;">Music</div>
        <div style="background: #272727; color: white; padding: 6px 12px; border-radius: 8px; font-size: 14px;">Movies</div>
        <div style="background: #272727; color: white; padding: 6px 12px; border-radius: 8px; font-size: 14px;">Gaming</div>
    </div>

    <main class="feed" id="main-video-feed" style="padding-bottom: 80px;"></main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="material-icons">home</i>Home
        </a>
        <a href="shorts.html" class="nav-item">
            <i class="material-icons">bolt</i>Shorts
        </a>
        <div class="nav-item" onclick="checkUploadPermission()">
            <i class="material-icons upload-btn-main">add_circle_outline</i>
        </div>
        <a href="subscriptions.html" class="nav-item">
            <i class="material-icons">subscriptions</i>Subs
        </a>
        <a href="profile.html" class="nav-item">
            <i class="material-icons">account_circle</i>You
        </a>
    </nav>

    <script>
        const videoFeed = document.getElementById('main-video-feed');
        // Trending Channel IDs
        const channelIds = ['UCq-Fj5jknLsUf-MWSy4_brA', 'UC_aEa8K-EOJ3D6gOs7HcyNg', 'UCeVMnSShP_I8uyEQbbQjwGg'];

        async function fetchTrendingVideos() {
            for (let id of channelIds) {
                try {
                    const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=${id}`);
                    const data = await response.json();
                    
                    data.items.forEach(video => {
                        const videoId = video.link.split('v=')[1];
                        const mins = Math.floor(Math.random() * 15) + 2;
                        const secs = Math.floor(Math.random() * 59).toString().padStart(2, '0');
                        const realDuration = `${mins}:${secs}`;

                        videoFeed.innerHTML += `
                        <div class="video-card">
                            <a href="player.html?v=${videoId}&t=${encodeURIComponent(video.title)}&c=${encodeURIComponent(video.author)}">
                                <div class="thumbnail-container">
                                    <img src="https://img.youtube.com/vi/${videoId}/maxresdefault.jpg">
                                    <span class="duration-badge">${realDuration}</span>
                                </div>
                                <div class="video-info">
                                    <img src="https://ui-avatars.com/api/?name=${video.author}&background=random" class="channel-icon">
                                    <div class="video-text">
                                        <h3>${video.title}</h3>
                                        <p>${video.author} • 1.5M views • 2 hours ago</p>
                                    </div>
                                </div>
                            </a>
                        </div>`;
                    });
                } catch (error) { console.error("Error:", error); }
            }
        }

        function checkUploadPermission() {
            if(localStorage.getItem('isLoggedIn') === 'true') {
                let input = document.createElement('input');
                input.type = 'file';
                input.accept = 'video/*';
                input.onchange = _ => {
                    let file = input.files[0];
                    alert("Uploading Movie: " + file.name + "\nPlease wait, server is connecting...");
                };
                input.click();
            } else {
                window.location.href = 'login.html';
            }
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            window.location.href = 'login.html';
        }

        window.onload = fetchTrendingVideos;
    </script>
</body>
</html>
