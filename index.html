<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>YouTube Home</title>
</head>
<body>
    <header class="header">
        <div class="logo"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" width="90"></div>
        <div class="header-icons">
            <span class="material-icons-outlined">cast</span>
            <a href="notifications.html"><span class="material-icons-outlined">notifications</span></a>
            <a href="search.html"><span class="material-icons-outlined">search</span></a>
            <a href="profile.html" class="user-profile-circle">R</a>
        </div>
    </header>

    <div class="categories">
        <button class="active">All</button>
        <button>Gaming</button>
        <button>Music</button>
        <button>Live</button>
    </div>

    <main class="feed" id="video-feed">
        <div id="loading" style="color:white; text-align:center; padding:50px;">Real Videos Load Ho Rahi Hain...</div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active"><span class="material-icons-outlined">home</span><br>Home</a>
        <a href="shorts.html" class="nav-item"><span class="material-icons-outlined">explore</span><br>Shorts</a>
        <a href="upload.html" class="nav-item icon-btn"><span class="material-icons-outlined" style="font-size:38px;">add_circle_outline</span></a>
        <a href="subscriptions.html" class="nav-item"><span class="material-icons-outlined">subscriptions</span><br>Subs</a>
        <a href="profile.html" class="nav-item"><span class="material-icons-outlined">account_circle</span><br>You</a>
    </nav>

    <script>
        const feed = document.getElementById('video-feed');
        const loading = document.getElementById('loading');

        // Ye list un channels ki hai jinki videos aap automatic dikhana chahte hain
        const channelIds = [
            'UCq-Fj5jknLsUf-MWSy4_brA', // T-Series
            'UC_aEa8K-EOJ3D6gOs7HcyNg', // HUM TV
            'UCeVMnSShP_I8uyEQbbQjwGg', // ARY Digital
            'UC6769f5b66d66e7b7b123456'  // Backup ID
        ];

        async function loadYouTubeHome() {
            try {
                feed.innerHTML = ''; // Pehle load message saaf karein
                
                for (let cid of channelIds) {
                    // RSS se Real Data nikalne ka free tarika
                    const rssUrl = `https://www.youtube.com/feeds/videos.xml?channel_id=${cid}`;
                    const proxyUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
                    
                    const response = await fetch(proxyUrl);
                    const data = await response.json();

                    if (data.items) {
                        data.items.forEach(item => {
                            const videoId = item.link.split('v=')[1];
                            const title = item.title;
                            const channelName = item.author;
                            const thumbnail = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;

                            const card = `
                                <div class="video-card" style="margin-bottom:25px;">
                                    <a href="player.html?v=${videoId}">
                                        <div class="thumbnail-container">
                                            <img src="${thumbnail}" style="width:100%; display:block;">
                                            <span class="vid-time" style="position:absolute; bottom:8px; right:8px; background:rgba(0,0,0,0.8); color:white; padding:2px 5px; font-size:12px; border-radius:4px;">12:00</span>
                                        </div>
                                    </a>
                                    <div class="video-info" style="display:flex; padding:12px; gap:12px;">
                                        <div style="width:36px; height:36px; border-radius:50%; background:#444; flex-shrink:0;">
                                            <img src="https://i.pravatar.cc/100?u=${channelName}" style="width:100%; border-radius:50%;">
                                        </div>
                                        <div class="text">
                                            <h3 style="font-size:14px; color:white; margin:0; line-height:1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${title}</h3>
                                            <p style="font-size:12px; color:#aaa; margin-top:4px;">${channelName} • Real Channel</p>
                                        </div>
                                    </div>
                                </div>`;
                            feed.innerHTML += card;
                        });
                    }
                }
            } catch (error) {
                console.error("Error:", error);
                feed.innerHTML = "<p style='color:white; text-align:center;'>Ek baar page refresh karein!</p>";
            }
        }

        // Run on load
        loadYouTubeHome();
    </script>
</body>
</html>
