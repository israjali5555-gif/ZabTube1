<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <title>ZabPlay - Unlimited Experience</title>
    
    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>

    <style>
        body { background:#0F0F0F; margin:0; font-family: Roboto, Arial, sans-serif; color: white; overflow-x: hidden; }
        
        /* === LOGO FIX === */
        .zab-logo-box {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, #FF0000 0%, #8B0000 100%);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .zab-logo-box::after {
            content: '';
            border-top: 6px solid transparent; border-bottom: 6px solid transparent;
            border-left: 10px solid white; margin-left: 2px;
        }

        .splash-logo-box {
            width: 100px; height: 100px;
            background: linear-gradient(135deg, #FF0000 0%, #8B0000 100%);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
        }
        .splash-logo-box::after {
            content: '';
            border-top: 20px solid transparent; border-bottom: 20px solid transparent;
            border-left: 35px solid white; margin-left: 5px;
        }

        /* === VIDEO FEED STYLE === */
        .video-card { width: 100%; margin-bottom: 15px; animation: fadeIn 0.5s ease-in; cursor: pointer; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .thumbnail-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #222; }
        .thumbnail-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .video-info { display: flex; padding: 12px; gap: 12px; }
        .channel-icon { width: 40px; height: 40px; border-radius: 50%; background: #333; flex-shrink: 0; }
        
        .video-text h3 { font-size: 15px; margin: 0; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .video-text p { font-size: 12px; color: #aaa; margin: 5px 0 0 0; }

        .header { position: sticky; top: 0; background: #0F0F0F; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; border-bottom: 1px solid #222; }
        .brand-container { display: flex; align-items: center; gap: 10px; }
        .brand-name { font-size: 20px; font-weight: bold; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #0F0F0F; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { color: white; text-align: center; font-size: 10px; text-decoration: none; opacity: 0.8; cursor: pointer; }
        .nav-item i { font-size: 24px; display: block; margin-bottom: 2px; }
        .nav-item:active, .nav-item.active { opacity: 1; color: #FF0000; }

        #zabplay-splash { position: fixed; inset: 0; background: #0F0F0F; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .loading-shimmer { padding: 30px; text-align: center; color: #FF0000; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div id="zabplay-splash">
        <div class="splash-logo-box"></div>
        <h2 style="margin-top: 20px; letter-spacing: 2px; font-family: sans-serif;">ZABPLAY</h2>
    </div>

    <header class="header">
        <div class="brand-container">
            <div class="zab-logo-box"></div>
            <span class="brand-name">ZabPlay</span>
        </div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <i class="material-icons">cast</i>
            <i class="material-icons" onclick="loadCategory('New Viral Videos')">search</i>
            <div style="width: 28px; height: 28px; border-radius: 50%; background: #FF5722; text-align: center; line-height: 28px; font-weight: bold; font-size: 14px;" onclick="logout()">R</div>
        </div>
    </header>

    <main id="main-video-feed" style="padding-bottom: 80px;"></main>
    <div id="loading" class="loading-shimmer">EXPLORING NEW CONTENT...</div>

    <nav class="bottom-nav">
        <div class="nav-item" onclick="location.reload()"><i class="material-icons">home</i>Home</div>
        <div class="nav-item" onclick="loadCategory('Shorts Trending')"><i class="material-icons">bolt</i>Shorts</div>
        <div class="nav-item" onclick="loadCategory('Latest Music')"><i class="material-icons">subscriptions</i>Subs</div>
        <div class="nav-item" onclick="alert('Library is empty!')"><i class="material-icons">video_library</i>Library</div>
    </nav>

    <script>
        const API_KEY = 'AIzaSyDq0kXgyqtOFXPjytI5yw5tuIZYl-xuTFs';
        const videoFeed = document.getElementById('main-video-feed');
        let nextPageToken = ''; 
        let isLoading = false;
        let currentQuery = ''; 

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('zabplay-splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('zabplay-splash').style.display = 'none';
                    videoFeed.innerHTML = '';
                    loadYouTubeVideos();
                }, 500);
            }, 2500);
        };

        // FIXED: New category logic (Purani list delete + Shuru se loading)
        async function loadCategory(query) {
            if (isLoading) return;
            window.scrollTo(0, 0);
            videoFeed.innerHTML = '';
            nextPageToken = '';
            currentQuery = query;
            document.getElementById('loading').innerText = "DISCOVERING " + query.toUpperCase() + "...";
            loadYouTubeVideos();
        }

        async function loadYouTubeVideos() {
            if (isLoading) return;
            isLoading = true;
            document.getElementById('loading').style.display = 'block';

            try {
                let url;
                // FIXED: Agar query hai toh Search API, nahi toh Trending API
                if(currentQuery !== '') {
                    url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=20&q=${encodeURIComponent(currentQuery)}&type=video&pageToken=${nextPageToken}&key=${API_KEY}`;
                } else {
                    url = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&chart=mostPopular&regionCode=IN&maxResults=20&pageToken=${nextPageToken}&key=${API_KEY}`;
                }
                
                const response = await fetch(url);
                const data = await response.json();

                if (data.items && data.items.length > 0) {
                    // IMPORTANT: Save next token for unique content
                    nextPageToken = data.nextPageToken || ''; 

                    // Randomize home feed on first load only
                    let videos = data.items;
                    if(videoFeed.innerHTML === '' && currentQuery === '') {
                        videos = videos.sort(() => Math.random() - 0.5);
                    }

                    videos.forEach(item => {
                        // Handle ID for both Search and Videos API
                        const vId = (typeof item.id === 'string') ? item.id : item.id.videoId;
                        if(!vId) return;

                        const title = item.snippet.title;
                        const channel = item.snippet.channelTitle;
                        const views = item.statistics ? formatViews(item.statistics.viewCount) : "New Video";
                        const thumb = item.snippet.thumbnails.high.url;

                        const card = document.createElement('div');
                        card.className = 'video-card';
                        card.onclick = () => window.location.href = `player.html?v=${vId}`;
                        card.innerHTML = `
                            <div class="thumbnail-container">
                                <img src="${thumb}">
                            </div>
                            <div class="video-info">
                                <div class="channel-icon" style="background-image: url('https://ui-avatars.com/api/?name=${encodeURIComponent(channel)}&background=random'); background-size: cover;"></div>
                                <div class="video-text">
                                    <h3>${title}</h3>
                                    <p>${channel} • ${views}</p>
                                </div>
                            </div>`;
                        videoFeed.appendChild(card);
                    });
                } else {
                    // If no more items, reset to loop or show message
                    nextPageToken = '';
                }
            } catch (error) {
                console.error("API Error:", error);
            } finally {
                isLoading = false;
                document.getElementById('loading').style.display = (nextPageToken) ? 'none' : 'block';
            }
        }

        // SMOOTH INFINITE SCROLL
        window.onscroll = () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 1500) {
                if (!isLoading && nextPageToken) {
                    loadYouTubeVideos();
                }
            }
        };

        function formatViews(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M views';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K views';
            return num + ' views';
        }

        function logout() { localStorage.removeItem('isLoggedIn'); window.location.href = 'login.html'; }
    </script>
</body>
</html>
