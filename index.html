<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <title>YouTube Home - Pro Max</title>
    
    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>

    <style>
        body { background:#0F0F0F; margin:0; font-family: Roboto, Arial, sans-serif; color: white; overflow-x: hidden; }
        .header { position: sticky; top: 0; background: #0F0F0F; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; }
        .video-card { width: 100%; margin-bottom: 12px; border-bottom: 1px solid #222; animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .thumbnail-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #222; }
        .thumbnail-container img { width: 100%; height: 100%; display: block; object-fit: cover; }
        .duration-badge { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.8); color: white; padding: 2px 6px; font-size: 11px; border-radius: 4px; }
        .video-info { display: flex; padding: 12px; gap: 12px; }
        .channel-icon { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: #333; }
        .video-text h3 { font-size: 14px; color: white; margin: 0; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .video-text p { font-size: 12px; color: #aaa; margin: 4px 0 0 0; }
        a { text-decoration: none; color: inherit; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #0F0F0F; display: flex; justify-content: space-around; padding: 8px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { color: white; text-align: center; font-size: 10px; text-decoration: none; display: flex; flex-direction: column; align-items: center; }
        .nav-item i { font-size: 24px; margin-bottom: 2px; }
        .upload-btn-main { font-size: 42px !important; margin-top: -10px; color: #fff; }
        .loading-shimmer { padding: 20px; text-align: center; color: #aaa; font-size: 12px; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" width="90"></div>
        <div class="header-icons" style="display: flex; gap: 18px;">
            <i class="material-icons">cast</i>
            <i class="material-icons">notifications_none</i>
            <i class="material-icons">search</i>
            <div id="user-initial" style="width: 26px; height: 26px; border-radius: 50%; background: #FF5722; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold;" onclick="logout()">R</div>
        </div>
    </header>

    <div style="display: flex; gap: 10px; padding: 10px 15px; overflow-x: auto; white-space: nowrap; scrollbar-width: none; position: sticky; top: 48px; background: #0F0F0F; z-index: 90;">
        <div style="background: white; color: black; padding: 6px 12px; border-radius: 8px; font-size: 14px;">All</div>
        <div style="background: #272727; color: white; padding: 6px 12px; border-radius: 8px; font-size: 14px;">Movies</div>
        <div style="background: #272727; color: white; padding: 6px 12px; border-radius: 8px; font-size: 14px;">Songs</div>
        <div style="background: #272727; color: white; padding: 6px 12px; border-radius: 8px; font-size: 14px;">Comedy</div>
        <div style="background: #272727; color: white; padding: 6px 12px; border-radius: 8px; font-size: 14px;">Cricket</div>
    </div>

    <main class="feed" id="main-video-feed" style="padding-bottom: 80px;"></main>
    <div id="loading" class="loading-shimmer">Loading more videos...</div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="material-icons">home</i>Home</a>
        <a href="shorts.html" class="nav-item"><i class="material-icons">bolt</i>Shorts</a>
        <div class="nav-item" onclick="checkUploadPermission()"><i class="material-icons upload-btn-main">add_circle_outline</i></div>
        <a href="subscriptions.html" class="nav-item"><i class="material-icons">subscriptions</i>Subs</a>
        <a href="profile.html" class="nav-item"><i class="material-icons">account_circle</i>You</a>
    </nav>

    <script>
        const videoFeed = document.getElementById('main-video-feed');
        let isLoading = false;
        // Duplicate check ke liye Set
        const displayedVideos = new Set();
        
        // --- Sabhi Famous Indian aur Pakistani Channels ki Badi List ---
        const channelIds = [
            'UCq-Fj5jknLsUf-MWSy4_brA', 'UCffXmS6lX_3-96mE9pYv6nw', 'UCttspZesZIDEwwpVIgoZtWQ', // T-Series, Zee Music, Sony Music
            'UC55IWq7n_6oK6-63_XU3T2w', 'UCi2E6n_S8uH566X4G698F_A', 'UC-lHJZR3Gqxm24_Vd_AJ5Yw', // Goldmines, Sony PAL, PewDiePie
            'UCX6OQ3DkcsbYNE6H8uQQuVA', 'UC2to_M9Wf5m6f5Uf_o6uFcA', 'UCynM4_V99A7l9Zp3_f_S2rQ', // Yash Raj, Shemaroo, Venus
            'UC689oVpZOn_N_n_u08v-qkg', 'UCk8GzjMOrvo8Ky_meK76w6A', 'UC3SshVq_E6eXpA_m4_X3C6Q', // Hum TV, Har Pal Geo, Coke Studio
            'UC_aEa8K-EOJ3D6gOs7HcyNg', 'UCpEhnqL0y41EpW2TvWAHD7Q', 'UCm7E7GZz_fB0sZzVbV_yYog', // SET India, Sony, Colors
            'UC07-dOwgza1IguKA86jqx9w', 'UCv2-u_8K-R_O-q6S-P_I8uy', 'UC0T_p-Z9_vLzX7l-L8G_j7A', // Zee TV, Pakistani Classics, Sufi Score
            'UC89V_8N_f0f_fG_6_v8fS6A', 'UC-K_S_W2_mX6E_R-zXU_K6A', 'UCF_fDSgPsS7C_S6DAt_oOzA'  // Tips, Eros, Star Plus
        ];

        async function fetchVideos() {
            if (isLoading) return;
            isLoading = true;
            
            // Har baar 10 random channels uthayenge list se
            const shuffled = channelIds.sort(() => 0.5 - Math.random());
            const selected = shuffled.slice(0, 10);

            for (let id of selected) {
                try {
                    // Cache breaker taaki hamesha naya data mile
                    const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=${id}&nocache=${new Date().getTime()}`);
                    const data = await response.json();
                    
                    if (data.items) {
                        data.items.forEach(video => {
                            const videoId = video.link.split('v=')[1];

                            // Duplicate Video Check: Agar video pehle se hai toh dobara nahi dikhayega
                            if (!displayedVideos.has(videoId)) {
                                displayedVideos.add(videoId);

                                const isMovie = video.title.toLowerCase().match(/(movie|film|full movie|drama)/);
                                const mins = isMovie ? Math.floor(Math.random() * 60) + 120 : Math.floor(Math.random() * 10) + 3;
                                const secs = Math.floor(Math.random() * 59).toString().padStart(2, '0');
                                const views = (Math.random() * 50 + 1).toFixed(1) + "M";

                                const card = document.createElement('div');
                                card.className = 'video-card';
                                card.innerHTML = `
                                    <a href="player.html?v=${videoId}&t=${encodeURIComponent(video.title)}&c=${encodeURIComponent(video.author)}">
                                        <div class="thumbnail-container">
                                            <img src="https://img.youtube.com/vi/${videoId}/maxresdefault.jpg" onerror="this.src='https://img.youtube.com/vi/${videoId}/mqdefault.jpg'">
                                            <span class="duration-badge">${mins}:${secs}</span>
                                        </div>
                                        <div class="video-info">
                                            <img src="https://ui-avatars.com/api/?name=${video.author}&background=random" class="channel-icon">
                                            <div class="video-text">
                                                <h3>${video.title}</h3>
                                                <p>${video.author} • ${views} views • Trending</p>
                                            </div>
                                        </div>
                                    </a>`;
                                videoFeed.appendChild(card);
                            }
                        });
                    }
                } catch (e) { console.log("Skipping failed channel..."); }
            }
            isLoading = false;
        }

        // Infinite Scroll: Screen ke end tak pahunchne par aur load karega
        window.onscroll = function() {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 1200) {
                fetchVideos();
            }
        };

        function checkUploadPermission() {
            if(localStorage.getItem('isLoggedIn') === 'true') {
                let input = document.createElement('input');
                input.type = 'file'; input.accept = 'video/*';
                input.onchange = _ => { alert("Uploading Movie: " + input.files[0].name + "\nConnecting to Secure Server..."); };
                input.click();
            } else { window.location.href = 'login.html'; }
        }

        function logout() { localStorage.removeItem('isLoggedIn'); window.location.href = 'login.html'; }

        // Initial loading taaki page khulte hi dher saari videos hon
        window.onload = async () => {
            await fetchVideos();
            await fetchVideos();
            await fetchVideos();
        };
    </script>
</body>
</html>
