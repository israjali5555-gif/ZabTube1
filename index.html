    <div class="categories">
        <button class="active">All</button>

    <main class="feed">
        <div class="video-card">

                <div class="text">
                    <a href="player.html"><h3>Ruffian Gaming: Insane Clutch Win!</h3></a>

        <div class="video-card">

                    <video class="feed-video" muted loop playsinline poster="https://picsum.photos/seed/vid2/400/225">

                <div class="channel-img" style="background-image: url('https://i.pravatar.cc/150?u=2');"></div>

    <script>
        // Scroll par video auto-play karne ka script
        const videos = document.querySelectorAll('.feed-video');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.play();
                } else {
                    entry.target.pause();
                }
            });
        }, { threshold: 0.7 });
        videos.forEach(video => observer.observe(video));
    </script>
</body>
