<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>YouTube Home</title>
</head>
<body>
    <header class="header">
        <div class="logo"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" width="90"></div>
        <div class="header-icons">
            <span class="material-icons-outlined">cast</span>
            <a href="notifications.html"><span class="material-icons-outlined">notifications</span></a>
            <a href="search.html"><span class="material-icons-outlined">search</span></a>
            <a href="profile.html" class="user-profile-circle">R</a>
        </div>
    </header>

    <div class="categories">
        <button class="active">All</button>
        <button>Gaming</button>
        <button>Music</button>
        <button>Live</button>
    </div>

    <main class="feed" id="video-feed">
        <div id="status-msg" style="color:white; text-align:center; padding:50px;">Real Videos Connect Ho Rahi Hain...</div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active"><span class="material-icons-outlined">home</span><br>Home</a>
        <a href="shorts.html" class="nav-item"><span class="material-icons-outlined">explore</span><br>Shorts</a>
        <a href="upload.html" class="nav-item icon-btn"><span class="material-icons-outlined" style="font-size:38px;">add_circle_outline</span></a>
        <a href="subscriptions.html" class="nav-item"><span class="material-icons-outlined">subscriptions</span><br>Subs</a>
        <a href="profile.html" class="nav-item"><span class="material-icons-outlined">account_circle</span><br>You</a>
    </nav>

    <script>
        const feed = document.getElementById('video-feed');
        const msg = document.getElementById('status-msg');

        // Ye list un channels ki hai jinka data 100% stable aata hai
        const channels = ['UCq-Fj5jknLsUf-MWSy4_brA', 'UC_aEa8K-EOJ3D6gOs7HcyNg', 'UCeVMnSShP_I8uyEQbbQjwGg'];

        async function fetchVideos() {
            try {
                let allContent = "";
                for (let id of channels) {
                    // RSS proxy ka use kar rahe hain jo sabse zyada stable hai
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=${id}`);
                    const data = await res.json();
                    
                    if (data.items) {
                        data.items.forEach(v => {
                            const vId = v.link.split('v=')[1];
                            allContent += `
                            <div class="video-card" style="margin-bottom:20px;">
                                <a href="player.html?v=${vId}">
                                    <div class="thumbnail-container">
                                        <img src="https://img.youtube.com/vi/${vId}/maxresdefault.jpg" style="width:100%; display:block;">
                                    </div>
                                </a>
                                <div class="video-info" style="display:flex; padding:12px; gap:12px;">
                                    <div style="width:36px; height:36px; border-radius:50%; background:#333; overflow:hidden;">
                                        <img src="https://i.pravatar.cc/100?u=${v.author}" style="width:100%;">
                                    </div>
                                    <div class="text">
                                        <h3 style="font-size:14px; color:white; margin:0; line-height:1.4;">${v.title}</h3>
                                        <p style="font-size:12px; color:#aaa; margin-top:4px;">${v.author} • Latest Video</p>
                                    </div>
                                </div>
                            </div>`;
                        });
                    }
                }
                feed.innerHTML = allContent;
            } catch (err) {
                msg.innerText = "Connection Slow Hai. Refresh Karein.";
            }
        }

        window.onload = fetchVideos;
    </script>
</body>
</html>
