<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>YouTube Home</title>
</head>
<body>
    <header class="header">
        <div class="logo"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" width="90"></div>
        <div class="header-icons">
            <span class="material-icons-outlined">cast</span>
            <a href="notifications.html"><span class="material-icons-outlined">notifications</span></a>
            <a href="search.html"><span class="material-icons-outlined">search</span></a>
            <a href="profile.html" class="user-profile-circle">R</a>
        </div>
    </header>

    <div class="categories">
        <button class="active">All</button>
        <button>Gaming</button>
        <button>Music</button>
        <button>Live</button>
    </div>

    <main class="feed" id="video-feed">
        <div id="loading" style="color:white; text-align:center; padding:50px;">YouTube Se Connect Ho Raha Hai...</div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active"><span class="material-icons-outlined">home</span><br>Home</a>
        <a href="shorts.html" class="nav-item"><span class="material-icons-outlined">explore</span><br>Shorts</a>
        <a href="upload.html" class="nav-item icon-btn"><span class="material-icons-outlined" style="font-size:38px;">add_circle_outline</span></a>
        <a href="subscriptions.html" class="nav-item"><span class="material-icons-outlined">subscriptions</span><br>Subs</a>
        <a href="profile.html" class="nav-item"><span class="material-icons-outlined">account_circle</span><br>You</a>
    </nav>

    <script>
        const feed = document.getElementById('video-feed');
        const loading = document.getElementById('loading');

        async function fetchRealVideos() {
            // Hum multiple servers try karenge taaki "Internet Check" wala error na aaye
            const urls = [
                'https://pipedapi.kavin.rocks/trending?region=IN',
                'https://yt.artemislena.eu/api/v1/trending?region=IN',
                'https://invidious.snopyta.org/api/v1/trending'
            ];

            for (let url of urls) {
                try {
                    const response = await fetch(url);
                    if (!response.ok) continue;
                    
                    const videos = await response.json();
                    loading.style.display = 'none';
                    feed.innerHTML = ''; // Pehle wala content clear karein

                    videos.forEach(video => {
                        // Link se Video ID nikalna
                        const videoId = video.url ? video.url.split('=')[1] : video.videoId;
                        if (!videoId) return;

                        const card = `
                        <div class="video-card" style="margin-bottom:20px;">
                            <a href="player.html?v=${videoId}">
                                <div class="thumbnail-container">
                                    <img src="${video.thumbnail}" class="feed-video" style="width:100%; border-radius:0px;">
                                    <span class="vid-time">${video.duration ? Math.floor(video.duration/60) + ":" + (video.duration%60).toString().padStart(2,'0') : 'LIVE'}</span>
                                </div>
                            </a>
                            <div class="video-info" style="display:flex; padding:12px; gap:12px;">
                                <img src="${video.uploaderAvatar || 'https://i.pravatar.cc/100'}" style="width:36px; height:36px; border-radius:50%; background:#333;">
                                <div class="text">
                                    <h3 style="font-size:14px; color:white; margin:0; line-height:1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${video.title}</h3>
                                    <p style="font-size:12px; color:#aaa; margin-top:4px;">${video.uploaderName} • ${video.views.toLocaleString()} views</p>
                                </div>
                            </div>
                        </div>`;
                        feed.innerHTML += card;
                    });
                    return; // Agar ek server se data aa gaya toh loop rok do
                } catch (e) {
                    console.log("Next server trying...");
                }
            }
            // Agar koi server na chale
            loading.innerText = "Abhi Server Busy Hai, Thodi der baad refresh karein.";
        }

        // Run function
        fetchRealVideos();
    </script>
</body>
</html>
