<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>YouTube Home</title>
</head>
<body>
    <header class="header">
        <div class="logo"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" width="90"></div>
        <div class="header-icons">
            <span class="material-icons-outlined">cast</span>
            <a href="notifications.html"><span class="material-icons-outlined">notifications</span></a>
            <a href="search.html"><span class="material-icons-outlined">search</span></a>
            <a href="profile.html" class="user-profile-circle">R</a>
        </div>
    </header>

    <div class="categories">
        <button class="active">All</button>
        <button>Gaming</button>
        <button>Music</button>
        <button>Live</button>
    </div>

    <main class="feed" id="video-feed">
        <div id="loading-text" style="color:white; text-align:center; padding:50px;">YouTube Se Connect Ho Raha Hai...</div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active"><span class="material-icons-outlined">home</span><br>Home</a>
        <a href="shorts.html" class="nav-item"><span class="material-icons-outlined">explore</span><br>Shorts</a>
        <a href="upload.html" class="nav-item icon-btn"><span class="material-icons-outlined" style="font-size:38px;">add_circle_outline</span></a>
        <a href="subscriptions.html" class="nav-item"><span class="material-icons-outlined">subscriptions</span><br>Subs</a>
        <a href="profile.html" class="nav-item"><span class="material-icons-outlined">account_circle</span><br>You</a>
    </nav>

    <script>
        const feed = document.getElementById('video-feed');
        const loading = document.getElementById('loading-text');

        // Ye function asli YouTube server (Piped API) se trending videos layega
        async function loadRealLibrary() {
            try {
                // Free API jo bina card/key ke real YouTube data deti hai
                const response = await fetch('https://pipedapi.kavin.rocks/trending?region=PK');
                const videos = await response.json();
                
                loading.style.display = 'none'; // Loading text chhupao

                videos.forEach(video => {
                    // Link se Video ID nikalna
                    const videoId = video.url.split('=')[1];
                    
                    const card = `
                        <div class="video-card" style="margin-bottom: 25px;">
                            <a href="player.html?v=${videoId}">
                                <div class="thumbnail-container" style="position:relative;">
                                    <img src="${video.thumbnail}" class="feed-video" style="width:100%; border-radius:0px;">
                                    <span style="position:absolute; bottom:8px; right:8px; background:rgba(0,0,0,0.8); color:white; padding:2px 5px; font-size:12px; border-radius:4px;">
                                        ${Math.floor(video.duration / 60)}:${(video.duration % 60).toString().padStart(2, '0')}
                                    </span>
                                </div>
                            </a>
                            <div class="video-info" style="display:flex; padding:12px; gap:12px;">
                                <img src="${video.uploaderAvatar}" style="width:40px; height:40px; border-radius:50%; background:#333;">
                                <div class="text">
                                    <h3 style="font-size:15px; color:white; margin:0; line-height:1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">
                                        ${video.title}
                                    </h3>
                                    <p style="font-size:12px; color:#aaa; margin-top:5px;">
                                        ${video.uploaderName} • ${video.views.toLocaleString()} views
                                    </p>
                                </div>
                            </div>
                        </div>`;
                    feed.innerHTML += card;
                });
            } catch (error) {
                console.error("Connection Error:", error);
                loading.innerText = "Internet Check Karein!";
            }
        }

        // Automatic load start karein
        loadRealLibrary();

        // Infinite Scroll: Jab user bottom tak pahuche, aur videos aayein
        window.onscroll = function() {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
                // Aap chahein toh yahan aur category load karwa sakte hain
            }
        };
    </script>
</body>
</html>
